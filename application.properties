# ===========================
# application.properties
# Spring Boot Configuration File
# ===========================

# ---- MongoDB Connection ----
# This tells Spring Boot where MongoDB is running.
# By default, MongoDB runs on localhost:27017
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=userdb

# ---- Server Port ----
# The Spring Boot app will start on port 8080
# You can access it at: http://localhost:8080
server.port=8080

# ---- Logging ----
# Show SQL/MongoDB queries in the console (helpful for debugging)
logging.level.org.springframework.data.mongodb=DEBUG
